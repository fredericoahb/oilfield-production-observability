global:
  scrape_interval: 10s

scrape_configs:
  - job_name: ingestion-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ingestion-service:8080"]

  - job_name: kpi-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["kpi-service:8080"]
