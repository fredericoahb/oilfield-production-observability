server:
  port: ${PORT:8080}


spring:
  application:
    name: kpi-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:observability}?sslmode=${DB_SSLMODE:disable}
    username: ${DB_USER:observability}
    password: ${DB_PASSWORD:observability}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

management:

  otlp:
    metrics:
      export:
        enabled: false

  prometheus:
    metrics:
      export:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
