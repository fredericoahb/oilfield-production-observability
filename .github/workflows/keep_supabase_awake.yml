name: keep-supabase-awake

on:
  schedule:
    - cron: "0 9 * * 1,4" # Mon/Thu 09:00 UTC (adjust as you like)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Heartbeat (simple SQL)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL secret not set; skipping."
            exit 0
          fi
          sudo apt-get update -y
          sudo apt-get install -y postgresql-client
          # 'select 1' is enough to count as activity.
          psql "$SUPABASE_DB_URL" -c "select 1;"
